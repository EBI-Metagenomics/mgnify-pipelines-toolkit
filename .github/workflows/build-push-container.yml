name: Build and Push Container to Quay.io

on:
  # TEMPORARY: Testing trigger - REMOVE BEFORE MERGING TO MAIN
  push:
    branches:
      - feature/automated-docker-container
    paths:
      - 'container/**'
  # Production triggers (restore these)
  # pull_request:
  #   types: [closed]
  #   branches:
  #     - main
  #   paths:
  #     - 'container/**'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    # TEMPORARY: Removed condition for testing - RESTORE BEFORE MERGING
    # if: |
    #   github.event.pull_request.merged == true &&
    #   contains(github.event.pull_request.labels.*.name, 'container-update')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: quay.io/microbiome-informatics/mgnify-pipelines-toolkit
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./container
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed with tags ${{ steps.meta.outputs.tags }}"
