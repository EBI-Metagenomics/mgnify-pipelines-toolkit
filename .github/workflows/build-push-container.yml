name: Build and Push Container to Quay.io

on:
  # TEMPORARY: Testing trigger - REMOVE BEFORE MERGING TO MAIN
  push:
    branches:
      - feature/automated-docker-container
  # Production trigger (restore this)
  # release:
  #   types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Container tag to use (overrides pyproject.toml version)"
        required: false
        type: string
      push:
        description: "Push to Quay.io (false for dry-run)"
        required: true
        default: true
        type: boolean

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install build

      - name: Build Python package
        run: python -m build

      - name: Copy wheel to container directory
        run: cp dist/*.whl container/

      - name: Extract version from pyproject.toml
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
            echo "Using manual tag: $VERSION"
          else
            VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
            echo "Extracted version from pyproject.toml: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: quay.io/microbiome-informatics/mgnify-pipelines-toolkit
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./container
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push != false }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed with tags ${{ steps.meta.outputs.tags }}"

      - name: Clean up wheel files
        if: always()
        run: rm -f container/*.whl
