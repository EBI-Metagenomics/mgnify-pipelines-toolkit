name: Create Container Update PR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to use (overrides pyproject.toml)"
        required: false
        type: string

jobs:
  create-pr:
    name: Create PR for Container Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mgnify-pipelines-toolkit
        uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            echo "Using manual version: $VERSION"
          else
            VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
            echo "Extracted version from pyproject.toml: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create container directory and files
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Create container directory
          mkdir -p container

          # Create Dockerfile
          cat > container/Dockerfile << 'EOF'
          FROM mambaorg/micromamba:2.5.0

          COPY --chown=$MAMBA_USER:$MAMBA_USER env.yaml /tmp/env.yaml

          RUN micromamba install -y -n base -f /tmp/env.yaml \
              && micromamba install -y -n base conda-forge::procps-ng \
              && micromamba env export --name base --explicit > environment.lock \
              && echo ">> CONDA_LOCK_START" \
              && cat environment.lock \
              && echo "<< CONDA_LOCK_END" \
              && micromamba clean -a -y

          USER root

          ENV PATH="$MAMBA_ROOT_PREFIX/bin:$PATH"
          EOF

          # Create env.yaml
          cat > container/env.yaml << EOF
          channels:
          - conda-forge
          - bioconda
          dependencies:
          - pyfastx=2.2.0
          - python=3.11
          - pip
          - pip:
            - mgnify-pipelines-toolkit==$VERSION
          EOF

          echo "Created files in container/"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update container to version ${{ steps.version.outputs.version }}"
          branch: container-update-${{ steps.version.outputs.version }}
          title: "Update container to version ${{ steps.version.outputs.version }}"
          body: |
            ## Automated Container Update

            This PR updates the container files to version **${{ steps.version.outputs.version }}**.

            ### Changes
            - Updated Dockerfile for version ${{ steps.version.outputs.version }}
            - Updated env.yaml with version ${{ steps.version.outputs.version }} dependencies

            ### Release Information
            Release: ${{ github.event.release.html_url }}

            ---
            🤖 This PR was automatically created by the mgnify-pipelines-toolkit release workflow.
          labels: |
            automated
            container-update
