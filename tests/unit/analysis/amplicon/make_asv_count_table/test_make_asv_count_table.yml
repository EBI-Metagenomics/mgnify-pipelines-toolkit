- name: make_asv_count_table test_wrong_args
  tags:
    - make_asv_count_table
  exit_code: 2
  command: make_asv_count_table --chromosome X
  stderr:
    contains:
      - "make_asv_count_table: error: the following arguments are required: -t/--taxa, -f/--fwd, -a/--amp, -hd/--headers, -s/--sample"
- name: make_asv_count_table test_correct_args
  tags:
    - make_asv_count_table
  command: make_asv_count_table -t tests/fixtures/asv_count_table/test_taxa.tsv -f tests/fixtures/asv_count_table/test_1_map.txt -a tests/fixtures/asv_count_table/test.concat.txt -hd tests/fixtures/asv_count_table/headers.txt -s sample
  files:
    - path: "sample_concat.txt_asv_read_counts.tsv"
      contains:
      - "seq_2\t641"
- name: make_asv_count_table test_unclassified_default
  tags:
    - make_asv_count_table
  command: make_asv_count_table -t tests/fixtures/asv_count_table_unclassified/mini_taxa.tsv -f tests/fixtures/asv_count_table_unclassified/mini_map.txt -a tests/fixtures/asv_count_table_unclassified/mini.concat.txt -hd tests/fixtures/asv_count_table_unclassified/mini_headers.txt -s sample_unc
  files:
    - path: "sample_unc_concat.txt_PR2_asv_krona_counts.txt"
      contains:
        - "2\tunclassified"
- name: make_asv_count_table test_skip_unclassified
  tags:
    - make_asv_count_table
  command: make_asv_count_table -t tests/fixtures/asv_count_table_unclassified/mini_taxa.tsv -f tests/fixtures/asv_count_table_unclassified/mini_map.txt -a tests/fixtures/asv_count_table_unclassified/mini.concat.txt -hd tests/fixtures/asv_count_table_unclassified/mini_headers.txt -s sample_skip --skip-unclassified
  files:
    - path: "sample_skip_concat.txt_PR2_asv_krona_counts.txt"
      must_not_contain:
        - "unclassified"
