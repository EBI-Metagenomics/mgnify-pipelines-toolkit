- name: Add Rhea and CHEBI annotation test (FILE)
  tags:
    - add_rhea_chebi_annotation
  command: >
    add_rhea_chebi_annotation
    -p tests/fixtures/diamond/proteins_short.faa
    -o short_test.tsv
    -d tests/fixtures/diamond/diamond_short.tsv
    --rhea2chebi tests/fixtures/diamond/rhea2chebi_short.tsv
  exit_code: 0
  files:
    - path: "short_test.tsv"
      md5sum: 9daf1e1ece3250d3174b414ac33a2045

- name: Add Rhea and CHEBI annotation test (STDIN)
  tags:
    - add_rhea_chebi_annotation
  command: >
    bash -c "cat tests/fixtures/diamond/diamond_short.tsv |
    add_rhea_chebi_annotation
    -p tests/fixtures/diamond/proteins_short.faa
    -o short_test.tsv
    -d -
    --rhea2chebi tests/fixtures/diamond/rhea2chebi_short.tsv"
  exit_code: 0
  files:
    - path: "short_test.tsv"
      md5sum: 9daf1e1ece3250d3174b414ac33a2045

- name: Add Rhea and CHEBI annotation ValueError on unparseable protein ID
  tags:
    - add_rhea_chebi_annotation
  command: >
    bash -c "printf '>BADFORMAT\nMKT\n' > proteins_bad.faa;
    printf 'BADFORMAT\tUniRef90_X\t1e-5\t90\tUniRef90_X foo RheaID=RHEA:11708\n' > diamond_bad.tsv;
    add_rhea_chebi_annotation -p proteins_bad.faa -o bad_out.tsv -d diamond_bad.tsv --rhea2chebi tests/fixtures/diamond/rhea2chebi_short.tsv"
  exit_code: 1
  stderr:
    contains:
      - "Could not parse contig_id from protein_id 'BADFORMAT'"
